name: 问题咨询
description: 使用疑问、配置问题或不确定是否为 bug 的反馈。
title: "[Question] "
labels: ["question"]
body:
  - type: textarea
    id: goal
    attributes:
      label: 描述
      description: 你想完成什么？已经尝试了什么？
      placeholder: "例如：我想通过 SSH 隧道连接内网 PostgreSQL，已确认本机 psql 可以连接，但 DBX 中测试连接提示..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 环境信息
      description: 数据库类型和版本、操作系统、DBX 版本等。
      placeholder: |
        DBX 版本：
        操作系统：
        数据库：
